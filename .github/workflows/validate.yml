name: Validate skills

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out skills
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check TypeScript
        run: npm run typecheck
      - name: Run repository validator
        run: npm run validate
      - name: Test discovery renderer
        run: npm test
      - name: Verify example presentation is current
        run: npm run check:example
      - name: Verify skills.sh discovery
        run: npx --yes skills@latest add . --list
      - name: Check out Agent Skills reference validator
        uses: actions/checkout@v4
        with:
          repository: agentskills/agentskills
          path: .agent-skills-spec
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Run official Agent Skills validator
        shell: bash
        run: |
          for skill in skills/*; do
            uv run --project .agent-skills-spec/skills-ref skills-ref validate "$PWD/$skill"
          done
